name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0). The tag v<version> will be created."
        required: true
  push:
    tags:
      - "v*"

jobs:
  build-natives:
    name: build native ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: libscantivy.so
            os_arch: linux-x86_64
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: libscantivy.so
            os_arch: linux-aarch64
            cross: true
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: libscantivy.dylib
            os_arch: macos-aarch64
            cross: false
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact: scantivy.dll
            os_arch: windows-x86_64
            cross: true
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: install cross (if needed)
        if: matrix.cross
        run: cargo install cross --locked
      - name: build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.os_arch }}
          path: rust/target/${{ matrix.target }}/release/${{ matrix.artifact }}
          retention-days: 7

  publish:
    needs: build-natives
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scala
    steps:
      - uses: actions/checkout@v5
      - name: verify tag matches Cargo.toml version
        # build.sbt's version is derived from the git tag by sbt-dynver, so it can't drift. The
        # Cargo.toml version is independent and must be kept in sync manually — guard against
        # the user forgetting to bump it before tagging. (The Rust crate isn't published to
        # crates.io, but having Cargo.toml lie about the release version is still a smell.)
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep -E '^version = ' ../rust/Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag       : $TAG_VERSION"
          echo "Cargo.toml: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::tag '$TAG_VERSION' does not match Cargo.toml ('$CARGO_VERSION') — refusing to publish"
            exit 1
          fi
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 22
      - uses: sbt/setup-sbt@v1
      - uses: actions/download-artifact@v5
        with:
          path: native-libs
      - name: stage native libs
        run: |
          mkdir -p src/main/resources/native/{linux-x86_64,linux-aarch64,macos-aarch64,windows-x86_64}
          cp ../native-libs/linux-x86_64/libscantivy.so   src/main/resources/native/linux-x86_64/libscantivy.so
          cp ../native-libs/linux-aarch64/libscantivy.so  src/main/resources/native/linux-aarch64/libscantivy.so
          cp ../native-libs/macos-aarch64/libscantivy.dylib src/main/resources/native/macos-aarch64/libscantivy.dylib
          cp ../native-libs/windows-x86_64/scantivy.dll   src/main/resources/native/windows-x86_64/scantivy.dll
          ls -laR src/main/resources/native
      - name: import GPG key
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
        run: |
          echo "$PGP_SECRET" | gpg --batch --import
      - name: publish to Sonatype
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: sbt -v "publishSigned; sonatypeBundleRelease"

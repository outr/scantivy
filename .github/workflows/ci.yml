name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --release --all-targets -- -D warnings
      - name: cargo build
        run: cargo build --release
      - name: cargo test
        run: cargo test --release
      - name: stage native lib for scala build
        run: |
          mkdir -p ../scala/lib
          cp target/release/libscantivy.so ../scala/lib/libscantivy.so

      # Hand the .so off to the scala job via an artifact so it can run tests.
      - uses: actions/upload-artifact@v5
        with:
          name: linux-x86_64
          path: scala/lib/libscantivy.so
          retention-days: 1

  scala:
    needs: rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scala
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 22
      - uses: sbt/setup-sbt@v1
      - uses: actions/download-artifact@v5
        with:
          name: linux-x86_64
          path: scala/lib
      - name: sbt test
        run: sbt -v test

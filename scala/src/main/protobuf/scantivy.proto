// IMPORTANT: keep in sync with rust/proto/scantivy.proto. The only differences are the scalapb
// import + flat_package option below, which are Scala-only.

syntax = "proto3";

import "scalapb/scalapb.proto";

package scantivy.proto;

option java_multiple_files = true;
option (scalapb.options) = {
  flat_package: true
};

// =============================================================================
// Common
// =============================================================================

enum SortDirection {
  SORT_ASC = 0;
  SORT_DESC = 1;
}

// =============================================================================
// Schema
// =============================================================================

enum FieldKind {
  FIELD_KIND_UNSPECIFIED = 0;
  TEXT = 1;     // tokenized — uses analyzer
  STRING = 2;   // raw, single-token
  BOOL = 3;
  I64 = 4;
  U64 = 5;
  F64 = 6;
  DATE = 7;     // millis since epoch
  BYTES = 8;
  FACET = 9;
  JSON_FIELD = 10;
  IP = 11;
}

message FacetOptions {
  bool hierarchical = 1;
  bool require_dim_count = 2;
}

message FieldDef {
  string name = 1;
  FieldKind kind = 2;
  bool stored = 3;
  bool indexed = 4;
  bool fast = 5;            // sortable / aggregatable
  bool tokenized = 6;       // applies when kind=TEXT
  optional string analyzer = 7;
  // Slot 8 was a `bool multi_valued` field that Scantivy never consulted (Tantivy treats every
  // field as implicitly multi-valued — call `add_*` more than once and you get multiple values).
  // Reserved so the slot can never be repurposed and silently change semantics.
  reserved 8;
  reserved "multi_valued";
  optional FacetOptions facet_options = 9;
}

message SchemaDef {
  repeated FieldDef fields = 1;
}

// =============================================================================
// Values & documents
// =============================================================================

message GeoPoint { double latitude = 1; double longitude = 2; }

message JsonValue {
  // Raw JSON bytes. Treated opaquely on the Rust side except for `JsonField` schema entries,
  // which decode the bytes into a JSON object before indexing.
  bytes encoded = 1;
}

message Value {
  oneof kind {
    string string_value = 1;
    int64 long_value = 2;
    uint64 ulong_value = 3;
    double double_value = 4;
    bool bool_value = 5;
    string facet_value = 6;
    int64 date_millis = 7;
    bytes bytes_value = 8;
    string ip_value = 9;
    JsonValue json_value = 10;
  }
}

message FieldValue {
  string name = 1;
  repeated Value values = 2;  // single-valued fields use one entry
}

message Document {
  repeated FieldValue fields = 1;
}

// =============================================================================
// Query AST
// =============================================================================

message Query {
  oneof node {
    QueryAll all = 1;
    QueryNone none = 2;
    QueryTerm term = 3;
    QueryRange range = 4;
    QueryIn in_set = 5;
    QueryStartsWith starts_with = 6;
    QueryEndsWith ends_with = 7;
    QueryContains contains = 8;
    QueryRegex regex = 9;
    QueryExact exact = 10;
    QueryFullText full_text = 11;
    QueryPhrase phrase = 12;
    QueryDrillDown drill_down = 13;
    QueryBool bool_query = 14;
    QueryExists exists = 15;
    QueryFuzzy fuzzy = 16;
    QueryPhrasePrefix phrase_prefix = 17;
    QueryBoost boost = 18;
    QueryDisjunctionMax disjunction_max = 19;
    QueryConstScore const_score = 20;
    QueryMoreLikeThis more_like_this = 21;
  }
}

message QueryAll {}
message QueryNone {}

message QueryTerm {
  string field = 1;
  Value value = 2;
}

message QueryRange {
  string field = 1;
  optional Value gte = 2;
  optional Value lte = 3;
  optional Value gt = 4;
  optional Value lt = 5;
}

message QueryIn {
  string field = 1;
  repeated Value values = 2;
}

message QueryStartsWith { string field = 1; string value = 2; }
message QueryEndsWith   { string field = 1; string value = 2; }
message QueryContains   { string field = 1; string value = 2; }
message QueryRegex      { string field = 1; string pattern = 2; }
message QueryExact      { string field = 1; string value = 2; }

message QueryFullText {
  // Uses Tantivy's QueryParser across the configured text fields.
  // If `fields` is empty, defaults to all TEXT fields in the schema.
  string query = 1;
  repeated string fields = 2;
}

message QueryPhrase {
  string field = 1;
  repeated string terms = 2;
  uint32 slop = 3;
}

message QueryDrillDown {
  string field = 1;
  repeated string path = 2;
  bool only_this_level = 3;
}

message QueryBool {
  repeated Query must = 1;
  repeated Query should = 2;
  repeated Query must_not = 3;
  repeated Query filter = 4;
  optional uint32 min_should_match = 5;
}

// True for any doc that has at least one value in `field`.
message QueryExists { string field = 1; }

// Fuzzy / Levenshtein term match. `distance` is capped at 2 by Tantivy. When `prefix` is true, the
// `value` is treated as a prefix and any remaining characters are matched fuzzily.
message QueryFuzzy {
  string field = 1;
  string value = 2;
  uint32 distance = 3;
  bool transposition_cost_one = 4;
  bool prefix = 5;
}

// Phrase whose last term matches as a prefix. Useful for as-you-type / autocomplete UX.
message QueryPhrasePrefix {
  string field = 1;
  repeated string terms = 2;
  optional uint32 max_expansions = 3;
}

// Wraps `inner` and multiplies its score by `factor`.
message QueryBoost {
  Query inner = 1;
  float factor = 2;
}

// Like a `should` set but takes max(disjunct_score) + tie_breaker * sum(other_disjunct_scores)
// instead of summing all matched disjuncts. Better for cross-field search where you don't want
// matching in 2 fields to dominate matching strongly in 1 field.
message QueryDisjunctionMax {
  repeated Query disjuncts = 1;
  optional float tie_breaker = 2;
}

// Wraps `inner` and overrides every matched doc's score with the constant `score` value.
message QueryConstScore {
  Query inner = 1;
  float score = 2;
}

// "Find similar docs" using term-frequency / inverse-doc-frequency on the source doc's stored
// fields. The source is identified by its id-field value (the schema must have `id_field` set on
// `CreateIndexRequest`).
message QueryMoreLikeThis {
  string source_id = 1;
  optional uint64 min_doc_frequency = 2;
  optional uint64 max_doc_frequency = 3;
  optional uint32 min_term_frequency = 4;
  optional uint32 max_query_terms = 5;
  optional uint32 min_word_length = 6;
  optional uint32 max_word_length = 7;
  optional float boost_factor = 8;
  repeated string stop_words = 9;
  // Whether the source doc itself should be excluded from results. Defaults to true (the typical
  // "find similar but not the same" UX); set to false to include the source doc, which Tantivy's
  // raw MoreLikeThis would otherwise rank at the top.
  optional bool exclude_source = 10;
}

// =============================================================================
// Sort
// =============================================================================

message SortRelevance  { SortDirection direction = 1; }
message SortIndexOrder { SortDirection direction = 1; }
message SortByField    { string field = 1; SortDirection direction = 2; }

message SortClause {
  oneof clause {
    SortRelevance relevance = 1;
    SortIndexOrder index_order = 2;
    SortByField by_field = 3;
  }
}

// =============================================================================
// Index lifecycle
// =============================================================================

message CreateIndexRequest {
  // If unset, an in-memory index is created.
  optional string path = 1;
  SchemaDef schema = 2;
  // Field name that uniquely identifies a document (used for upsert/delete by id).
  optional string id_field = 3;
  // IndexWriter heap budget in bytes (default 50 MB).
  optional uint64 writer_heap_bytes = 4;
}

message CreateIndexResponse {
  optional string index_id = 1;
  optional string error = 2;
}

message OpenIndexRequest {
  string path = 1;
  // The schema's `id_field` isn't persisted in the Tantivy on-disk format, so callers must re-
  // declare it when reopening if they want upsert/delete-by-id, `MoreLikeThis`, or `explain` to
  // work. Leave unset for read-only / search-only usage.
  optional string id_field = 2;
}

message DropIndexRequest {
  string index_id = 1;
}

message GenericResponse {
  optional string error = 1;
}

// =============================================================================
// Write ops
// =============================================================================

message IndexDocumentRequest {
  string index_id = 1;
  Document document = 2;
}

message IndexDocumentsRequest {
  string index_id = 1;
  repeated Document documents = 2;
}

message UpsertDocumentRequest {
  string index_id = 1;
  // Defaults to the schema's configured id_field.
  optional string id_field_override = 2;
  Value id_value = 3;
  Document document = 4;
}

message DeleteRequest {
  string index_id = 1;
  optional string id_field_override = 2;
  Value id_value = 3;
}

message DeleteByQueryRequest {
  string index_id = 1;
  Query query = 2;
}

message DeleteByQueryResponse {
  optional uint64 deleted_estimate = 1;
  optional string error = 2;
}

message TruncateRequest {
  string index_id = 1;
}

message OptimizeRequest {
  string index_id = 1;
  uint32 max_segments = 2;  // 0 → default (1)
}

message CommitRequest {
  string index_id = 1;
}

message CommitResponse {
  optional uint64 opstamp = 1;
  optional string error = 2;
}

message RollbackRequest {
  string index_id = 1;
}

// =============================================================================
// Count
// =============================================================================

message CountRequest {
  string index_id = 1;
  Query query = 2;
}

message CountResponse {
  optional uint64 count = 1;
  optional string error = 2;
}

// =============================================================================
// Search
// =============================================================================

enum ConversionMode {
  CONVERSION_DOC = 0;            // full stored doc
  CONVERSION_VALUE = 1;          // single field value per hit
  CONVERSION_JSON = 2;           // selected fields encoded as JsonValue
  CONVERSION_MATERIALIZED = 3;   // selected indexed fields as Document
  CONVERSION_DOC_AND_INDEXES = 4;
}

message FacetRequest {
  string field = 1;
  repeated string path = 2;
  optional uint32 children_limit = 3;
  optional uint32 dims_limit = 4;
}

message SearchRequest {
  string index_id = 1;
  Query query = 2;
  repeated SortClause sort = 3;
  uint32 offset = 4;
  uint32 limit = 5;
  bool count_total = 6;
  bool score_docs = 7;
  optional double min_doc_score = 8;
  repeated FacetRequest facets = 9;
  ConversionMode conversion = 10;
  // For Value conversion: field name to extract.
  // For Json/Materialized: subset of fields to return.
  repeated string return_fields = 11;
  // Optional snippet/highlight requests. Each entry produces a SnippetResult on every SearchHit.
  repeated SnippetSpec snippets = 12;
}

message SnippetSpec {
  string field = 1;
  optional uint32 max_num_chars = 2;   // default 150
  optional string pre_tag = 3;          // default "<b>"
  optional string post_tag = 4;         // default "</b>"
}

message SnippetResult {
  string field = 1;
  // Tag-wrapped fragment ready to render. Empty when the doc has no usable text for this field.
  string fragment = 2;
}

message SearchHit {
  oneof payload {
    Document doc = 1;
    Value value = 2;
    JsonValue json = 3;
    Document materialized = 4;
  }
  optional float score = 10;
  // Always echoed when the index has an id_field configured.
  optional string id = 11;
  repeated SnippetResult snippets = 12;
}

message FacetEntry {
  string label = 1;
  uint32 count = 2;
}

message FacetResult {
  string field = 1;
  repeated FacetEntry entries = 2;
  uint32 total_count = 3;
  uint32 child_count = 4;
}

message SearchResponse {
  repeated SearchHit hits = 1;
  optional uint64 total = 2;
  repeated FacetResult facets = 3;
  optional string error = 4;
}

// =============================================================================
// Aggregation
// =============================================================================

enum AggregationType {
  AGG_UNSPECIFIED = 0;
  AGG_SUM = 1;
  AGG_AVG = 2;
  AGG_MIN = 3;
  AGG_MAX = 4;
  AGG_COUNT = 5;
  AGG_STATS = 6;
  AGG_CARDINALITY = 7;
  AGG_HISTOGRAM = 8;
  AGG_TERMS = 9;
  AGG_CONCAT = 10;
  AGG_DATE_HISTOGRAM = 11;
  AGG_RANGE = 12;
  AGG_PERCENTILES = 13;
}

message AggregationFunction {
  string alias = 1;
  string field = 2;
  AggregationType type = 3;
  optional double histogram_interval = 10;
  optional uint32 terms_size = 11;
  // For AGG_CONCAT: separator between joined values (default ", ").
  optional string concat_separator = 12;
  // For AGG_CONCAT: hard cap on number of matched docs whose field is concatenated. Default 1000.
  // Larger values trade memory for completeness; uncapped concat is intentionally not supported.
  optional uint32 concat_max_values = 13;
  // For AGG_DATE_HISTOGRAM: ES-style fixed-interval string ("30s", "5m", "1h", "1d", ...).
  optional string date_fixed_interval = 14;
  // For AGG_DATE_HISTOGRAM: minimum doc_count for a bucket to be returned (default 0).
  optional uint64 date_min_doc_count = 15;
  // For AGG_DATE_HISTOGRAM: bucket-boundary offset, same syntax as fixed_interval.
  optional string date_offset = 16;
  // For AGG_RANGE: explicit numeric ranges. `from` is inclusive, `to` is exclusive; either can be
  // omitted for an open-ended bucket. `key` is an optional human label.
  repeated RangeBucketSpec range_buckets = 17;
  // For AGG_PERCENTILES: which percentiles to compute (e.g., [50, 95, 99]). Defaults to Tantivy's
  // standard set (1, 5, 25, 50, 75, 95, 99) when empty.
  repeated double percentiles = 18;
  // Sub-aggregations: only meaningful for bucket types (TERMS / HISTOGRAM / DATE_HISTOGRAM /
  // RANGE). Each sub-agg runs once per bucket and its result is attached to the bucket.
  repeated AggregationFunction sub_aggregations = 20;
}

message RangeBucketSpec {
  optional string key = 1;
  optional double from = 2;
  optional double to = 3;
}

message AggregationRequest {
  string index_id = 1;
  optional Query filter_query = 2;
  repeated AggregationFunction functions = 3;
}

message StatsResult {
  uint64 count = 1;
  double sum = 2;
  double min = 3;
  double max = 4;
  double avg = 5;
}

message TermBucket {
  Value key = 1;
  uint64 doc_count = 2;
  repeated AggregationResult sub_results = 3;
}

message HistogramBucket {
  double key = 1;
  uint64 doc_count = 2;
  repeated AggregationResult sub_results = 3;
}

message DateHistogramBucket {
  // Bucket boundary as millis since epoch.
  int64 key_millis = 1;
  uint64 doc_count = 2;
  // ES-style ISO-8601 representation of the boundary, when Tantivy provides it.
  optional string key_as_string = 3;
  repeated AggregationResult sub_results = 4;
}

message RangeBucket {
  optional string key = 1;
  optional double from = 2;
  optional double to = 3;
  uint64 doc_count = 4;
  repeated AggregationResult sub_results = 5;
}

message TermBucketList { repeated TermBucket buckets = 1; }
message HistogramBucketList { repeated HistogramBucket buckets = 1; }
message DateHistogramBucketList { repeated DateHistogramBucket buckets = 1; }
message RangeBucketList { repeated RangeBucket buckets = 1; }

message PercentilesResult {
  // Percentile (as a string key like "50.0") → value.
  map<string, double> values = 1;
}

message AggregationResult {
  string alias = 1;
  oneof value {
    double numeric = 2;
    StatsResult stats = 3;
    TermBucketList terms = 4;
    HistogramBucketList histogram = 5;
    string concat = 6;
    DateHistogramBucketList date_histogram = 7;
    RangeBucketList range = 8;
    PercentilesResult percentiles = 9;
  }
}

message AggregationResponse {
  repeated AggregationResult results = 1;
  optional string error = 2;
}

// =============================================================================
// Distinct (composite-cursor paging)
// =============================================================================

message DistinctRequest {
  string index_id = 1;
  optional Query filter_query = 2;
  string field = 3;
  uint32 page_size = 4;
  optional Value cursor = 5;  // last value from previous page (exclusive)
}

message DistinctResponse {
  repeated Value values = 1;
  optional Value next_cursor = 2;
  optional string error = 3;
}

// =============================================================================
// Explain (debug a single doc's score for a query)
// =============================================================================

message ExplainRequest {
  string index_id = 1;
  Query query = 2;
  // Looked up via the schema's id_field. The first matching doc is explained.
  string source_id = 3;
}

message ExplainResponse {
  // Pretty-printed JSON of Tantivy's `Explanation`. Empty when no doc matched the source_id.
  string explanation = 1;
  optional string error = 2;
}
